<!DOCTYPE html>
<html>
<head>
<title>Advanced Admin Dashboard</title>

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #667eea, #764ba2);
}

/* Layout */
.container {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #1e1e2f;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    color: #00e5ff;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.card {
    padding: 20px;
    border-radius: 12px;
    color: white;
    text-align: center;
}

.card1 { background: linear-gradient(to right, #00c6ff, #0072ff); }
.card2 { background: linear-gradient(to right, #f7971e, #ffd200); }
.card3 { background: linear-gradient(to right, #56ab2f, #a8e063); }
.card4 { background: linear-gradient(to right, #ff416c, #ff4b2b); }

/* Charts */
.chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

.chart-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
}
</style>

</head>

<body>
    <h3>Village Complaint Analysis</h3>
    <canvas id="villageChart"></canvas>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Admin Panel</h2>
    <p>Dashboard</p>
    <p>Complaints</p>
    <p>Analytics</p>
    <a href="/export">
    <button>Download Report</button>
    </a>
    <a href="/" style="color:white;">Logout</a>
</div>
<script>
new Chart(document.getElementById("villageChart"), {
    type: "bar",
    data: {
        labels: {{ villages|tojson }},
        datasets: [{
            label: "Complaints",
            data: {{ counts|tojson }}
        }]
    }
});
</script>

<!-- MAIN -->
<div class="main">

<h2>📊 Dashboard Overview</h2>

<div class="cards">
    <div class="card card1">
        <h3>{{total}}</h3>
        <p>Total Complaints</p>
    </div>

    <div class="card card2">
        <h3>{{pending}}</h3>
        <p>Pending</p>
    </div>

    <div class="card card3">
        <h3>{{resolved}}</h3>
        <p>Resolved</p>
    </div>

    <div class="card card4">
        <h3>{{today}}</h3>
        <p>Today Complaints</p>
    </div>
    <p>Today's Complaints: {{today}}</p>
</div>

<!-- CHARTS -->
<div class="chart-grid">

<div class="chart-box">
<h3>Status Chart</h3>
<canvas id="statusChart"></canvas>
</div>

<div class="chart-box">
<h3>Category Chart</h3>
<canvas id="categoryChart"></canvas>
</div>

</div>

</div>
</div>

<script>

// STATUS CHART
new Chart(document.getElementById("statusChart"), {
    type: "doughnut",
    data: {
        labels: ["Pending", "Resolved"],
        datasets: [{
            data: [{{pending}}, {{resolved}}]
        }]
    }
});

// CATEGORY CHART
new Chart(document.getElementById("categoryChart"), {
    type: "bar",
    data: {
        labels: ["Road", "Water", "Electricity", "Sanitation"],
        datasets: [{
            data: [{{road}}, {{water}}, {{electricity}}, {{sanitation}}]
        }]
    }
});

</script>

</body>
</html>
